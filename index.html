<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liquid Finger Ripple - Multi-Finger Fixed</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: "Segoe UI", system-ui, sans-serif; }
    canvas { display: block; width: 100%; height: 100%; position: absolute; inset: 0; z-index: 10; }
    #video { display: none; }
    .hud {
      position: fixed; left: 20px; top: 20px; z-index: 20;
      color: #fff; background: rgba(0,0,0,0.46); border: 1px solid rgba(255,255,255,0.08);
      padding: 15px; border-radius: 12px; pointer-events: none; backdrop-filter: blur(5px);
      max-width: min(360px, calc(100vw - 40px));
    }
    .hud h1 { font-size: 16px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
    .hud p { font-size: 12px; opacity: 0.85; line-height: 1.4; }
    .status { color: #63d7ff; font-weight: 700; }
  </style>
</head>
<body>
  <div class="hud">
    <h1>Liquid Interaction</h1>
    <p>1. Move fingers to ripple.<br />2. <span class="status">Grab (Pinch)</span> to form a water ball.<br />3. <span class="status">Release</span> to splash!</p>
    <p id="debug-info" style="margin-top:10px;color:#ffd966;">Loading models...</p>
  </div>

  <video id="video" playsinline autoplay muted></video>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

    const videoElement = document.getElementById("video");
    const debugInfo = document.getElementById("debug-info");

    let width = window.innerWidth;
    let height = window.innerHeight;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(width, height);
    document.body.appendChild(renderer.domElement);

    const displayScene = new THREE.Scene();
    const simScene = new THREE.Scene();
    const displayCamera = new THREE.Camera();
    const simCamera = new THREE.Camera();

    const createTarget = () =>
      new THREE.WebGLRenderTarget(width, height, {
        minFilter: THREE.LinearFilter,
        magFilter: THREE.LinearFilter,
        type: THREE.HalfFloatType,
        depthBuffer: false,
        stencilBuffer: false
      });

    let prevTarget = createTarget();
    let currTarget = createTarget();
    let nextTarget = createTarget();

    const clearTarget = (target) => {
      renderer.setRenderTarget(target);
      renderer.setClearColor(0x000000, 1);
      renderer.clear(true, true, true);
    };

    clearTarget(prevTarget);
    clearTarget(currTarget);
    clearTarget(nextTarget);
    renderer.setRenderTarget(null);

    const videoTexture = new THREE.VideoTexture(videoElement);
    videoTexture.minFilter = THREE.LinearFilter;
    videoTexture.magFilter = THREE.LinearFilter;
    videoTexture.colorSpace = THREE.SRGBColorSpace;

    const quadGeo = new THREE.PlaneGeometry(2, 2);

    // ========== 1. 物理模拟 Shader ==========
    const simMaterial = new THREE.ShaderMaterial({
      uniforms: {
        uPrevTexture: { value: prevTarget.texture },
        uCurrTexture: { value: currTarget.texture },
        uTexelSize: { value: new THREE.Vector2(1 / width, 1 / height) },
        uAspect: { value: width / height },
        uPointers: { value: Array.from({ length: 5 }, () => new THREE.Vector4(-10, -10, 0, 0)) },
        uPointerCount: { value: 0 },
        uInteractionCenter: { value: new THREE.Vector2(0.5, 0.5) },
        uState: { value: 0 },
        uBlast: { value: 0 },
        uTime: { value: 0 }
      },
      vertexShader: `
        varying vec2 vUv;
        void main() { vUv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }
      `,
      fragmentShader: `
        precision highp float;
        varying vec2 vUv;
        uniform sampler2D uPrevTexture;
        uniform sampler2D uCurrTexture;
        uniform vec2 uTexelSize;
        uniform float uAspect;
        uniform vec4 uPointers[5];
        uniform int uPointerCount;
        uniform vec2 uInteractionCenter;
        uniform int uState;
        uniform float uBlast;
        uniform float uTime;

        void main() {
          float curr = texture2D(uCurrTexture, vUv).r;
          float prev = texture2D(uPrevTexture, vUv).r;

          float disturbance = 0.0;

          // 只有 State 0 时，才根据伸出的手指数量产生波纹
          if (uState == 0) {
            for (int i = 0; i < 5; i++) {
              if (i >= uPointerCount) break;
              vec4 finger = uPointers[i];
              vec2 distVec = vUv - finger.xy;
              distVec.x *= uAspect;
              float dist = length(distVec);
              float speed = finger.z;

              float press = exp(-dist * 42.0);
              float ring = exp(-pow(max(dist - 0.028, 0.0) * 28.0, 2.0));
              disturbance += (-press * 0.020 + ring * 0.013) * (1.0 + speed * 8.0);
            }
          }

          if (uState == 1) {
            // 捏合：形成明显的水球/泡泡
            vec2 ballDelta = vUv - uInteractionCenter;
            ballDelta.x *= uAspect;
            float ballShape = exp(-length(ballDelta) * 4.0) * 0.4;
            curr = mix(curr, ballShape, 0.5);
          } else if (uState == 2) {
            // 释放：强烈飞溅
            vec2 splashDelta = vUv - uInteractionCenter;
            splashDelta.x *= uAspect;
            float dist = length(splashDelta);
            
            float ring1 = exp(-pow(dist - 0.04, 2.0) * 150.0) * uBlast * 0.8;
            float ring2 = exp(-pow(dist - 0.09, 2.0) * 100.0) * uBlast * 0.4;
            float hole = -exp(-dist * 15.0) * uBlast * 0.5;
            disturbance += ring1 + ring2 + hole;
          }

          curr += disturbance;

          float left = texture2D(uCurrTexture, vUv - vec2(uTexelSize.x, 0.0)).r;
          float right = texture2D(uCurrTexture, vUv + vec2(uTexelSize.x, 0.0)).r;
          float down = texture2D(uCurrTexture, vUv - vec2(0.0, uTexelSize.y)).r;
          float up = texture2D(uCurrTexture, vUv + vec2(0.0, uTexelSize.y)).r;
          float laplacian = (left + right + up + down) - 4.0 * curr;

          // 动态阻尼与波动系数
          float damping = 0.985; // 正常状态快速消散
          float waveSpeed = 0.24;
          
          if (uState == 1) {
            damping = 0.98;      // 水球保持更久
            waveSpeed = 0.05;    // 降低波动方程权重，防止水球被“震散”
          } else if (uState == 2) {
            damping = 0.985;
            waveSpeed = 0.24;
          }

          float next = 2.0 * curr - prev + waveSpeed * laplacian;
          next *= damping;

          gl_FragColor = vec4(next, 0.0, 0.0, 1.0);
        }
      `
    });

    // ========== 2. 显示 Shader ==========
    const displayMaterial = new THREE.ShaderMaterial({
      uniforms: {
        uHeightTexture: { value: currTarget.texture },
        uVideoTexture: { value: videoTexture },
        uTexelSize: { value: new THREE.Vector2(1 / width, 1 / height) }
      },
      vertexShader: `
        varying vec2 vUv;
        void main() { vUv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }
      `,
      fragmentShader: `
        precision highp float;
        varying vec2 vUv;
        uniform sampler2D uHeightTexture;
        uniform sampler2D uVideoTexture;
        uniform vec2 uTexelSize;

        void main() {
          float h = texture2D(uHeightTexture, vUv).r;
          float hLeft = texture2D(uHeightTexture, vUv - vec2(uTexelSize.x, 0.0)).r;
          float hRight = texture2D(uHeightTexture, vUv + vec2(uTexelSize.x, 0.0)).r;
          float hDown = texture2D(uHeightTexture, vUv - vec2(0.0, uTexelSize.y)).r;
          float hUp = texture2D(uHeightTexture, vUv + vec2(0.0, uTexelSize.y)).r;

          vec3 normal = normalize(vec3((hLeft - hRight) * 12.0, (hDown - hUp) * 12.0, 1.0));

          vec2 refractUV = clamp(vUv + normal.xy * 0.035, 0.0, 1.0);
          float r = texture2D(uVideoTexture, clamp(refractUV + normal.xy * 0.002, 0.0, 1.0)).r;
          float g = texture2D(uVideoTexture, refractUV).g;
          float b = texture2D(uVideoTexture, clamp(refractUV - normal.xy * 0.002, 0.0, 1.0)).b;
          vec3 videoColor = vec3(r, g, b);
          float ao = smoothstep(-0.1, 0.1, h);
          videoColor *= 0.8 + 0.2 * ao;

          vec3 lightDir = normalize(vec3(-0.45, 0.55, 1.0));
          vec3 viewDir = vec3(0.0, 0.0, 1.0);
          vec3 halfVec = normalize(lightDir + viewDir);

          float spec = pow(max(dot(normal, halfVec), 0.0), 72.0);
          float fresnel = pow(1.0 - max(dot(normal, viewDir), 0.0), 3.0);

          vec3 finalColor = videoColor;
          finalColor += vec3(1.0, 1.0, 1.0) * spec * 1.35;
          finalColor += vec3(0.22, 0.45, 0.68) * fresnel * 0.22;

          gl_FragColor = vec4(finalColor, 1.0);
        }
      `
    });

    simScene.add(new THREE.Mesh(quadGeo, simMaterial));
    displayScene.add(new THREE.Mesh(quadGeo, displayMaterial));

    const fingertipIndices = [4, 8, 12, 16, 20];
    const fingerVectors = Array.from({ length: 5 }, () => new THREE.Vector4(-10, -10, 0, 0));
    const pointerState = Array.from({ length: 5 }, () => ({
      current: new THREE.Vector2(0.5, 0.5),
      previous: new THREE.Vector2(0.5, 0.5)
    }));

    const interactionCenter = new THREE.Vector2(0.5, 0.5);
    const splashCenter = new THREE.Vector2(0.5, 0.5);
    let currentState = 0;
    let releaseFrames = 0;
    let blastStrength = 0;
    let usingCamera = false;
    let activeFingersCount = 0; // 新增：全局记录伸出手指数量

    function setDebug(message) { debugInfo.textContent = message; }

    async function initCameraStream() {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
      });
      videoElement.srcObject = stream;
      await videoElement.play();
      usingCamera = true;
      setDebug("Camera Active. Show your hand!");
    }

    const hands = new window.Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.7
    });

    hands.onResults((results) => {
      if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
        if (usingCamera) {
          currentState = 0;
          activeFingersCount = 0;
          setDebug("Camera Active. Show your hand!");
        }
        return;
      }

      const landmarks = results.multiHandLandmarks[0];
      const palmRef = landmarks[9];
      
      activeFingersCount = 0;
      let sumX = 0, sumY = 0;
      let sumDistToCenter = 0; // 修复 Bug 1：提到外部

      // 修复 Bug 2：阈值从 0.12 提高到 0.15，防止拇指误判
      for (let i = 0; i < 5; i++) {
        const tipIdx = fingertipIndices[i];
        const tip = landmarks[tipIdx];
        const distToPalm = Math.hypot(tip.x - palmRef.x, tip.y - palmRef.y);

        if (distToPalm > 0.15) {
          const targetX = tip.x;
          const targetY = 1.0 - tip.y;
          
          pointerState[i].current.x += (targetX - pointerState[i].current.x) * 0.3;
          pointerState[i].current.y += (targetY - pointerState[i].current.y) * 0.3;

          const velocity = pointerState[i].current.distanceTo(pointerState[i].previous);
          fingerVectors[activeFingersCount].set(
            pointerState[i].current.x,
            pointerState[i].current.y,
            velocity,
            1.0
          );
          pointerState[i].previous.copy(pointerState[i].current);

          sumX += pointerState[i].current.x;
          sumY += pointerState[i].current.y;
          activeFingersCount++;
        } else {
          fingerVectors[i].set(-10, -10, 0, 0);
        }
      }

      if (activeFingersCount > 0) {
        interactionCenter.set(sumX / activeFingersCount, sumY / activeFingersCount);
        
        for(let i = 0; i < activeFingersCount; i++) {
          const dx = fingerVectors[i].x - interactionCenter.x;
          const dy = fingerVectors[i].y - interactionCenter.y;
          sumDistToCenter += Math.sqrt(dx*dx + dy*dy);
        }
        const avgDist = sumDistToCenter / activeFingersCount;

        if (activeFingersCount >= 2 && avgDist < 0.08) {
          currentState = 1;
          releaseFrames = 0;
        } else if (currentState === 1 && avgDist > 0.15) {
          currentState = 2;
          releaseFrames = 15;
          blastStrength = 1.0;
          splashCenter.copy(interactionCenter);
        } else if (releaseFrames > 0) {
          currentState = 2;
        } else {
          currentState = 0;
        }
      } else {
        currentState = 0;
      }

      setDebug(`Fingers: ${activeFingersCount} | State: ${currentState === 0 ? "Move" : currentState === 1 ? "GRAB" : "SPLASH!"} | Dist: ${activeFingersCount > 0 ? (sumDistToCenter/activeFingersCount).toFixed(3) : '0.000'}`);
    });

    async function setupHands() {
      try {
        await initCameraStream();
        const cameraFeed = new window.Camera(videoElement, {
          onFrame: async () => { await hands.send({ image: videoElement }); },
          width: 1280, height: 720
        });
        cameraFeed.start();
      } catch (error) {
        setDebug(`Camera unavailable: ${error.message}`);
      }
    }

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const time = clock.getElapsedTime();

      if (releaseFrames > 0) releaseFrames -= 1;
      else if (currentState === 2) currentState = 0;

      blastStrength *= 0.92;

      simMaterial.uniforms.uPrevTexture.value = prevTarget.texture;
      simMaterial.uniforms.uCurrTexture.value = currTarget.texture;
      simMaterial.uniforms.uInteractionCenter.value.copy(currentState === 2 ? splashCenter : interactionCenter);
      
      // 修复 Bug 3：真正传递伸出的手指数量
      simMaterial.uniforms.uPointerCount.value = currentState === 0 ? activeFingersCount : 0;
      
      simMaterial.uniforms.uState.value = currentState;
      simMaterial.uniforms.uBlast.value = blastStrength;
      simMaterial.uniforms.uTime.value = time;

      for (let i = 0; i < 5; i++) {
        simMaterial.uniforms.uPointers.value[i].copy(fingerVectors[i]);
      }

      if (videoElement.readyState >= 2) videoTexture.needsUpdate = true;

      renderer.setRenderTarget(nextTarget);
      renderer.render(simScene, simCamera);

      const oldPrev = prevTarget;
      prevTarget = currTarget;
      currTarget = nextTarget;
      nextTarget = oldPrev;

      displayMaterial.uniforms.uHeightTexture.value = currTarget.texture;

      renderer.setRenderTarget(null);
      renderer.render(displayScene, displayCamera);
    }

    window.addEventListener("resize", () => {
      width = window.innerWidth;
      height = window.innerHeight;
      renderer.setSize(width, height);
      prevTarget.setSize(width, height);
      currTarget.setSize(width, height);
      nextTarget.setSize(width, height);
      simMaterial.uniforms.uTexelSize.value.set(1 / width, 1 / height);
      simMaterial.uniforms.uAspect.value = width / height;
      displayMaterial.uniforms.uTexelSize.value.set(1 / width, 1 / height);
      clearTarget(prevTarget);
      clearTarget(currTarget);
      clearTarget(nextTarget);
      renderer.setRenderTarget(null);
    });

    setupHands();
    animate();
  </script>
</body>
</html>
